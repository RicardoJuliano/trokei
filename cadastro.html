<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="style.css">
    <title>Trokei - Cadastro</title>
</head>
<body>

    <header>
        <nav>
            <div class="logo">
                <a href="index.html">Trokei</a>
            </div>
            <button class="menu-btn" onclick="toggleMenu()">☰</button>
            <ul>
                <li><a href="index.html">Início</a></li>
                <li><a href="#">Produtos</a></li>
                <li><a href="#">Contato</a></li>
                <li><a href="#">Quero vender</a></li>
            </ul>
            <div class="acoes">
                <a href="#">🔍</a>
                <a href="cadastro.html">👤</a>
                <a href="#" id="carrinho">🛒 <span id="contador-carrinho">0</span></a>
            </div>
        </nav>
    </header>

    <main>
        <section class="form-section">
            <div class="form-container">
                <h1>Criar conta</h1>
                <p>Junte-se à Trokei e comece a comprar e vender</p>

                <form id="form-cadastro">
                    <div class="campo">
                        <label for="nome">Nome completo</label>
                        <input type="text" id="nome" placeholder="Seu nome">
                    </div>
                    <div class="campo">
                        <label for="email">E-mail</label>
                        <input type="email" id="email" placeholder="seu@email.com">
                    </div>
                    <div class="campo">
                        <label for="senha">Senha</label>
                        <input type="password" id="senha" placeholder="Mínimo 6 caracteres">
                    </div>
                    <div class="campo">
                        <label for="confirmar">Confirmar senha</label>
                        <input type="password" id="confirmar" placeholder="Repita a senha">
                    </div>

                    <span id="mensagem-erro" class="erro"></span>

                    <button type="submit" class="btn">Criar conta</button>
                </form>

                <p class="login-link">Já tem conta? <a href="#">Entrar</a></p>
            </div>
        </section>
    </main>

    <footer>
        <p>© 2025 Trokei — Todos os direitos reservados</p>
    </footer>

    <script src="script.js"></script>
</body>
</html>
